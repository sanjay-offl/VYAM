services:
  postgres:
    image: postgres:16-alpine
    container_name: divyam-postgres
    environment:
      POSTGRES_DB: divyam
      POSTGRES_USER: divyam
      POSTGRES_PASSWORD: divyam
    ports:
      - "5432:5432"
    volumes:
      - divyam_pgdata:/var/lib/postgresql/data

volumes:
  divyam_pgdata:
