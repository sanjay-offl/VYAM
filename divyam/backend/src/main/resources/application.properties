# DIVYAM Backend Configuration

server.port=8080

# PostgreSQL (override with environment variables as needed)
spring.datasource.url=${DIVYAM_DB_URL:jdbc:postgresql://localhost:5432/divyam}
spring.datasource.username=${DIVYAM_DB_USER:divyam}
spring.datasource.password=${DIVYAM_DB_PASSWORD:divyam}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Static files (uploaded lectures)
# This serves files from ./uploads when you run the backend from the backend/ folder.
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.mvc.static-path-pattern=/uploads/**

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# Security / JWT
# IMPORTANT: For production, set DIVYAM_JWT_SECRET to a strong value.
divyam.jwt.secret=${DIVYAM_JWT_SECRET:change-me-in-production-change-me-in-production}
divyam.jwt.expirationSeconds=${DIVYAM_JWT_EXP_SECONDS:86400}

# CORS - frontend dev server
divyam.cors.allowedOrigins=${DIVYAM_CORS_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}
